name: Setup DNS for custom domain

on:
  workflow_dispatch:

jobs:
  dns:
    runs-on: ubuntu-latest
    steps:
      - name: Create CNAME for launchstatic.matchiq.co.kr
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE_ID: 34dbddbeffd17269f87196b4fa470465
        run: |
          set -e
          EXISTING=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?name=launchstatic.matchiq.co.kr" \
            -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json")
          if echo "$EXISTING" | grep -q '"count":0'; then
            curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
              -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" \
              --data '{"type":"CNAME","name":"launchstatic","content":"launchstatic.pages.dev","proxied":true,"ttl":1}'
          else
            echo "DNS record already exists"
          fi