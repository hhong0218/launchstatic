<!-- TEMPLATE: copy per article. Replace {{PLACEHOLDERS}} -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{META_TITLE}}</title>
  <meta name="description" content="{{META_DESCRIPTION}}">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://launchstatic.dev{{CANONICAL_PATH}}">
  <meta property="og:type" content="article">
  <meta property="og:title" content="{{META_TITLE}}">
  <meta property="og:description" content="{{META_DESCRIPTION}}">
  <meta property="og:url" content="https://launchstatic.dev{{CANONICAL_PATH}}">
  <meta property="og:site_name" content="LaunchStatic">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{META_TITLE}}">
  <meta name="twitter:description" content="{{META_DESCRIPTION}}">
  <link rel="stylesheet" href="/assets/css/main.css">
  <script type="application/ld+json">{{JSON_LD}}</script>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header"><div class="container header-inner">
    <a href="/" class="logo"><span class="logo-mark" aria-hidden="true">LS</span> LaunchStatic</a>
    <nav class="nav-desktop" aria-label="Main">
      <a href="/guides/">Guides</a><a href="/how-to/">How-to</a><a href="/templates/">Templates</a><a href="/tools/">Tools</a><a href="/contact.html" class="nav-cta">Contact</a>
    </nav>
    <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="mobile-nav">Menu</button>
    <nav id="mobile-nav" class="nav-mobile" aria-label="Mobile"><a href="/guides/">Guides</a><a href="/how-to/">How-to</a><a href="/templates/">Templates</a></nav>
  </div></header>
  <main id="main" class="section"><div class="container">
    <article class="prose article-body" itemscope itemtype="https://schema.org/Article">
      <meta itemprop="author" content="LaunchStatic">
      {{BREADCRUMB}}
      <h1 itemprop="headline">{{H1}}</h1>
      <p class="article-meta text-muted">{{DATE}} · {{READ_TIME}} · {{CATEGORY}}</p>
      {{BODY}}
      <section class="faq-block mt-4" itemscope itemtype="https://schema.org/FAQPage">{{FAQ_HTML}}</section>
      <section class="article-cta card mt-4">{{CTA_HTML}}</section>
    </article>
  </div></main>
  <footer class="site-footer"><div class="container footer-bottom"><span>© <span id="year"></span> LaunchStatic</span><span><a href="/privacy.html">Privacy</a></span></div></footer>
  <div id="cookie-banner" class="cookie-banner" role="dialog" aria-label="Cookie notice" hidden><p>We use essential cookies via Cloudflare. <a href="/cookies.html">Learn more</a>.</p><button type="button" id="cookie-accept" class="btn btn-primary">OK</button></div>
  <script src="/assets/js/main.js" defer></script>
</body>
</html>
